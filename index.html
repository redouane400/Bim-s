<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'Bim's - Commande</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.container {
  padding:20px;
}

h1 {
  font-size:28px;
}

.card {
  background:#1e293b;
  border-radius:15px;
  padding:15px;
  margin-bottom:20px;
}

img {
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

button {
  background:#facc15;
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  font-weight:bold;
  margin-top:10px;
}

.footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<div class="container">

  <h1>O'Bim's 🍔</h1>
  <p>Fried Chicken • Burger • Creil</p>

  <!-- HERO -->
  <div class="card">
    <img src="images/hero.jpeg" alt="O'Bim's Creil">
  </div>

  <!-- BURGERS -->
  <div class="card">
    <h2>Burgers</h2>
    <img src="images/burgers.jpg">
    <button>Commander</button>
  </div>

  <!-- TOWER -->
  <div class="card">
    <h2>Tower</h2>
    <img src="images/tower.jpeg">
    <button>Commander</button>
  </div>

  <!-- TASTY BEEF -->
  <div class="card">
    <h2>Tasty Beef</h2>
    <img src="images/tasty-beef.jpg">
    <button>Commander</button>
  </div>

  <!-- SOLO WINGS -->
  <div class="card">
    <h2>Solo Wings</h2>
    <img src="images/solo-wings.jpg">
    <button>Commander</button>
  </div>

  <!-- TORNADO -->
  <div class="card">
    <h2>Tornado Tandoori</h2>
    <img src="images/tornado-tandori.jpg">
    <button>Commander</button>
  </div>

  <!-- WINGS -->
  <div class="card">
    <h2>Wings</h2>
    <img src="images/wings.jpeg">
    <button>Commander</button>
  </div>

  <!-- WINGS BOX -->
  <div class="card">
    <h2>Wings Box</h2>
    <img src="images/wings-box.jpg">
    <button>Commander</button>
  </div>

</div>

<!-- PANIER -->
<div class="footer">
  <div>Panier : 0,00 €</div>
  <button>Voir panier</button>
</div>

</body>
</html>
